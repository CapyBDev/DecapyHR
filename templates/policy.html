{% extends "base.html" %}
{% block page_title %}Company Policy{% endblock %}
{% block content %}

<style>
body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}

.glass {
  background: rgba(12, 137, 254, 0.37);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}
.pdf-viewer {
  width: 100%;
  height: 600px;
  border-radius: 12px;
  border: none;
  margin-top: 15px;
  background: white;
  display: none; /* hidden first */
}
</style>

<div class="container">
  <div class="dashboard-card">

    <h4>📄 Company Policy</h4>

    <p class="mt-3">
      - Employees must follow company rules<br>
      - Leave must be approved<br>
      - Maintain professionalism<br>
    </p>

  </div>
</div>

{% endblock %}
