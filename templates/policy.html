{% extends "base.html" %}
{% block content %}

<style>
/* REMOVE DARK OVERLAY ISSUE */
body {
  background: #f4f6fb !important;
}

/* MAIN CARD */
.policy-card {
  background: white;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* PDF VIEWER */
.pdf-viewer {
  width: 100%;
  height: 80vh;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-top: 20px;
}
</style>

<div class="container mt-4">

  <div class="policy-card">

    <div class="d-flex justify-content-between align-items-center">
      <h4>📄 Company Policy</h4>

      <!-- UPLOAD BUTTON -->
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadPolicyModal">
        Upload Policy
      </button>
    </div>

    <hr>

    <!-- TEXT POLICY -->
    <p>
      - Employees must follow company rules<br>
      - Leave must be approved<br>
      - Maintain professionalism<br>
    </p>

    <!-- PDF VIEWER -->
    {% if policy_file %}
    <iframe class="pdf-viewer"
        src="{{ url_for('static', filename='uploads/' + policy_file) }}">
    </iframe>
    {% else %}
    <p class="text-muted">No policy file uploaded yet.</p>
    {% endif %}

  </div>

</div>

<!-- ===== MODAL UPLOAD ===== -->
<div class="modal fade" id="uploadPolicyModal">
  <div class="modal-dialog">
    <div class="modal-content">

<form method="POST" action="/admin/policy/upload" enctype="multipart/form-data">

  <div class="modal-header">
    <h5>Upload Policy PDF</h5>
    <button class="btn-close" data-bs-dismiss="modal"></button>
  </div>

  <div class="modal-body">
    <input type="file" name="file" accept="application/pdf" class="form-control">
  </div>

  <div class="modal-footer">
    <button class="btn btn-success">Upload</button>
  </div>

</form>

    </div>
  </div>
</div>

{% endblock %}
