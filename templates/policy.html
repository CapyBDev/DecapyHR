{% extends "base.html" %}
{% block content %}

<style>
  body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}
.glass {
  background: rgba(131, 199, 255, 0.79);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}

.card {
  border-radius: 14px;
  background:linear-gradient(rgba(255, 255, 255, 0.88), rgba(178, 208, 248, 0.91));
  padding: 20px;
}
/* MAIN CARD */
.policy-card {
  background: white;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* PDF VIEWER */
.pdf-viewer {
  width: 100%;
  height: 80vh;
  border-radius: 12px;
  border: 1px solid #d7f5ff;
  margin-top: 20px;
}
</style>

<div class="container mt-4">

  <div class="policy-card">

    <div class="d-flex justify-content-between align-items-center">
      <h4>📄 Company Policy</h4>

      <!-- UPLOAD BUTTON -->
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadPolicyModal">
        Upload Policy
      </button>
    </div>

    <hr>

    <!-- TEXT POLICY -->
    <p>
      - Employees must follow company rules<br>
      - Leave must be approved<br>
      - Maintain professionalism<br>
    </p>

    <!-- PDF VIEWER -->
    {% if policy_file %}
    <iframe class="pdf-viewer"
        src="{{ url_for('static', filename='uploads/' + policy_file) }}">
    </iframe>
    {% else %}
    <p class="text-muted">No policy file uploaded yet.</p>
    {% endif %}

  </div>

</div>

<!-- ===== MODAL UPLOAD ===== -->
<div class="modal fade" id="uploadPolicyModal">
  <div class="modal-dialog">
    <div class="modal-content">

<form method="POST" action="/admin/policy/upload" enctype="multipart/form-data">

  <div class="modal-header">
    <h5>Upload Policy PDF</h5>
    <button class="btn-close" data-bs-dismiss="modal"></button>
  </div>

  <div class="modal-body">
    <input type="file" name="file" accept="application/pdf" class="form-control">
  </div>

  <div class="modal-footer">
    <button class="btn btn-success">Upload</button>
  </div>

</form>

    </div>
  </div>
</div>

{% endblock %}
