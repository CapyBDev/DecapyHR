{% extends "base.html" %}
{% block page_title %}
Notice Board
{% endblock %}
{% block content %}

<style>
body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}

.glass {
  background: rgba(12, 137, 254, 0.37);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}
</style>

<div class="container mt-4">
  <h3 class="text-white mb-3">Edit Notice</h3>

  <form method="POST">
    <textarea name="content" class="form-control mb-3" rows="5">
{{ notice[0] if notice else "" }}
    </textarea>

    <button class="btn btn-success">Save Notice</button>
  </form>
</div>

{% endblock %}
