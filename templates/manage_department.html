{% extends "base.html" %}
{% block title %}Departments{% endblock %}
{% block content %}

<style>
/* same style (no change) */
.dept-link{
  color: #0d6efd;
  cursor: pointer;
  font-weight: 600;
}
.dept-link:hover{
  text-decoration: underline;
}
</style>

<div class="card glass-card">
  <div class="card-body">
    <h4 class="mb-3"><i class="bi bi-building"></i> Departments</h4>

    <!-- Add Department -->
    <form class="row g-2 mb-3" method="post">
      <div class="col-md-10">
        <input class="form-control" name="name" placeholder="Enter department name" required>
      </div>
      <div class="col-md-2 d-grid">
        <button class="btn btn-primary">Add</button>
      </div>
    </form>

    {% if departments %}
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th></th>
          </tr>
        </thead>

        <tbody>
          {% for d in departments %}
          <tr>
            <td>{{ d.id }}</td>
            <td>
              <span class="dept-link" onclick="openDept({{d.id}})">
                {{ d.name }}
              </span>
            </td>
            <td class="text-end">
              <form method="post"
                    action="{{ url_for('delete_department', dept_id=d.id) }}"
                    onsubmit="return confirm('Delete this department?');">
                <button class="btn btn-sm btn-outline-danger">🗑️</button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      <!-- PANEL -->
      <div id="deptPanel" class="card mt-3 p-3" style="display:none;">
        <h5 id="deptTitle"></h5>
        <p>Total Employees: <span id="deptTotal"></span></p>

        <ul id="deptList" class="list-group"></ul>

        <button class="btn btn-secondary mt-2" onclick="closeDept()">Close</button>
      </div>

    </div>
    {% else %}
      <div class="alert alert-info text-center">No departments yet</div>
    {% endif %}
  </div>
</div>

<!-- ✅ SCRIPT MUST BE INSIDE BLOCK -->
<script>
function openDept(id){
  fetch("/admin/departments/" + id)
  .then(res => res.json())
  .then(data => {

    document.getElementById("deptPanel").style.display = "block";

    document.getElementById("deptTitle").innerText = data.department;
    document.getElementById("deptTotal").innerText = data.total;

    let list = document.getElementById("deptList");
    list.innerHTML = "";

    data.employees.forEach(emp => {
      list.innerHTML += `
        <li class="list-group-item">
          <strong>${emp.full_name}</strong> - ${emp.position || "-"}
          <br><small>${emp.email || ""}</small>
        </li>
      `;
    });
  });
}

function closeDept(){
  document.getElementById("deptPanel").style.display = "none";
}
</script>

{% endblock %}
