<!DOCTYPE html>
<html>
<head>
<title>JETAMA HR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Segoe UI';
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:url('/static/images/DJI_0094.JPG') center/cover no-repeat;
    filter: blur(4px);
    z-index:-2;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: rgba(99,102,241,0.25);
    z-index:-1;
}

/* NAVBAR */
.topbar {
    background:white;
    border-radius:15px;
    padding:12px 20px;
    margin:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* LEFT NAV */
.nav-links a {
    margin-right:8px;
    text-decoration:none;
    color:#555;
    padding:8px 14px;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    transition:0.2s;
}

.nav-links a:hover {
    background:#eef2ff;
}

/* ACTIVE BUTTON */
.nav-links .active {
    background:#2563eb;
    color:white;
}

/* RIGHT SIDE */
.user-area {
    display:flex;
    align-items:center;
    gap:15px;
}

/* NOTIFICATION */
.notif {
    position:relative;
    font-size:20px;
    cursor:pointer;
}

.notif-badge {
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:white;
    font-size:10px;
    border-radius:50%;
    padding:2px 5px;
}

/* USER PROFILE */
.profile {
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar {
    width:35px;
    height:35px;
    border-radius:50%;
    background:linear-gradient(135deg,#6366f1,#ec4899);
}

/* CONTENT */
.content {
    max-width:1100px;
    margin:20px auto;
}

/* CARD */
.card-box {
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* PAGE ANIMATION */
.fade-slide {
    animation: fadeSlide 0.5s ease;
}

@keyframes fadeSlide {
    from {
        opacity:0;
        transform:translateY(10px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- NAVBAR -->
<div class="topbar">

<!-- LEFT -->
<div class="nav-links">
    <a href="/dashboard" class="{% if request.path=='/dashboard' %}active{% endif %}">
        <i class="bi bi-grid"></i> 🏠 Dashboard
    </a>

    <a href="/submit" class="{% if request.path=='/submit' %}active{% endif %}">
        <i class="bi bi-plus-circle"></i> 📄 Submit Claim
    </a>

    <a href="/admin" class="{% if request.path=='/admin' %}active{% endif %}">
        <i class="bi bi-check-circle"></i> ✅ Approve Claims
    </a>

    <a href="/claims" class="{% if request.path=='/claims' %}active{% endif %}">
        <i class="bi bi-folder"></i> 📁 My Claims
    </a>

    <a href="#">📊 Reports</a>
</div>

<!-- RIGHT -->
<div class="user-area">

    <!-- Notification -->
    <div class="notif">
        <i class="bi bi-bell"></i>
        <span class="notif-badge">3</span>
    </div>

    <!-- User -->
    <div class="profile">
        <div class="avatar"></div>
        <div>
            <strong>Mi name</strong><br>
            <small class="text-muted">Position</small>
        </div>
    </div>

</div>

</div>

<!-- CONTENT -->
<div class="content fade-slide">
{% block content %}{% endblock %}
</div>

</body>
</html>
