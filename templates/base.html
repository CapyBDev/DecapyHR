<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JETAMA HR & ESG System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { font-family: 'Poppins', sans-serif; }

body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}

.glass {
  background: rgba(12, 137, 254, 0.37);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 250px;
  height: 100vh;
  position: fixed;
  background: linear-gradient(180deg, #ccd3ffdb, #0a17abdb);
  color: white;
  padding: 20px;
}

.logo {
  display: flex;
  justify-content: center;
  margin-bottom: 25px;
}

.logo img {
  width: 120px;
  object-fit: contain;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  margin-bottom: 8px;
  transition: 0.3s;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.2);
}

.sidebar a.active {
  background: white;
  color: #0a17ab !important;
  font-weight: 600;
}

/* ===== MAIN ===== */
.main {
  margin-left: 250px;
  padding: 20px;
}

/* ===== TOPBAR ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(180deg, #fefeffec, #6f76fcc9);
  padding: 15px 25px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.hello-text {
  font-weight: 600;
}

.breadcrumb {
  font-size: 12px;
  color: gray;
}

/* SEARCH */
.search-box {
  display: flex;
  align-items: center;
  background: #f1f2f6;
  padding: 8px 12px;
  border-radius: 10px;
}

.search-box input {
  border: none;
  outline: none;
  background: transparent;
}

/* RIGHT */
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  background: #f1f2f6;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== PROFILE DROPDOWN ===== */
.profile-dropdown {
  position: relative;
}

.profile-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #f1f2f6;
  padding: 5px 10px;
  border-radius: 10px;
  cursor: pointer;
}

.profile-box img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

.dropdown-menu-custom {
  position: absolute;
  top: 55px;
  right: 0;
  background: white;
  width: 180px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.15);
  display: none;
  overflow: hidden;
  z-index: 1000;
}

.dropdown-menu-custom a {
  display: block;
  padding: 12px;
  text-decoration: none;
  color: #333;
  transition: 0.3s;
}

.dropdown-menu-custom a:hover {
  background: #f1f2f6;
}

.show {
  display: block;
}
</style>

</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

  <div class="logo">
    <img src="{{ url_for('static', filename='images/logo.png') }}">
  </div>

  <a href="/admin/dashboard" class="{% if request.path == '/admin/dashboard' %}active{% endif %}">
    <i class="bi bi-grid"></i> Dashboard
  </a>

  <a href="/admin/users" class="{% if '/admin/users' in request.path %}active{% endif %}">
    <i class="bi bi-people"></i> Employee
  </a>

  <a href="/admin/leaves" class="{% if '/admin/leaves' in request.path %}active{% endif %}">
    <i class="bi bi-calendar-check"></i> Leave
  </a>

  <a href="/admin/claims" class="{% if '/admin/claims' in request.path %}active{% endif %}">
    <i class="bi bi-cash-stack"></i> Claims
  </a>

  <a href="/admin/departments" class="{% if '/admin/departments' in request.path %}active{% endif %}">
    <i class="bi bi-building"></i> Departments
  </a>

</div>

<!-- ===== MAIN ===== -->
<div class="main">

<!-- ===== TOPBAR ===== -->
<div class="topbar">

  <div class="topbar-left">
    <i class="bi bi-list"></i>

    <div>
      <div class="hello-text">Hello {{ session.name }} 👋</div>
      <div class="breadcrumb">
        Home > {{ request.path.split('/')[-1]|capitalize }}
      </div>
    </div>
  </div>

  <div class="topbar-right">

    <div class="search-box">
      <input type="text" placeholder="Search Here...">
      <i class="bi bi-search"></i>
    </div>

    <div class="icon-btn"><i class="bi bi-globe"></i></div>
    <div class="icon-btn"><i class="bi bi-envelope"></i></div>
    <div class="icon-btn"><i class="bi bi-bell"></i></div>

    <!-- PROFILE DROPDOWN -->
    <div class="profile-dropdown">

      <div class="profile-box" onclick="toggleDropdown()">
        <img src="{{ url_for('static', filename='images/JETAMA SDN BHD LOGO (TRANSPARENT).png') }}">
        <div>
          <div>{{ session.name }}</div>
          <small>online</small>
        </div>
        <i class="bi bi-chevron-down"></i>
      </div>

      <div id="dropdownMenu" class="dropdown-menu-custom">
        <a href="/profile"><i class="bi bi-person"></i> View Profile</a>
        <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
      </div>

    </div>

  </div>

</div>

{% block content %}{% endblock %}

</div>

<!-- ===== SCRIPT ===== -->
<script>
function toggleDropdown() {
  document.getElementById("dropdownMenu").classList.toggle("show");
}

window.onclick = function(e) {
  if (!e.target.closest('.profile-dropdown')) {
    document.getElementById("dropdownMenu").classList.remove("show");
  }
}
</script>

</body>
</html>
