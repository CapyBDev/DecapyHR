<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>JETAMA HR & ESG System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { font-family: 'Poppins', sans-serif; }

/* ===== BODY ===== */
body {
  margin: 0;
  background: #f5f6fa;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 250px;
  height: 100vh;
  position: fixed;
  background: linear-gradient(180deg, #6b91e2db, #0a3186);
  color: white;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  margin-bottom: 8px;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.2);
}

.active {
  background: white;
  color: #0a6c86 !important;
  font-weight: 600;
}

/* ===== MAIN ===== */
.main {
  margin-left: 250px;
  padding: 20px;
}

/* ===== TOPBAR ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(180deg, #fefeffec, #6f76fcc9);
  padding: 15px 25px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* LEFT */
.topbar-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.hello-text {
  font-weight: 600;
}

.breadcrumb {
  font-size: 12px;
  color: gray;
}

/* SEARCH */
.search-box {
  display: flex;
  align-items: center;
  background: #f1f2f6;
  padding: 8px 12px;
  border-radius: 10px;
}

.search-box input {
  border: none;
  outline: none;
  background: transparent;
}

/* RIGHT */
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  background: #f1f2f6;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* PROFILE */
.profile-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #f1f2f6;
  padding: 5px 10px;
  border-radius: 10px;
}

.profile-box img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}
</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h4>JETAMA</h4>

<a href="/admin/dashboard" class="{% if request.path == '/admin/dashboard' %}active{% endif %}">
  Dashboard
</a>

<a href="#">Employee</a> <a href="#">Leave</a> <a href="#">Claims</a> <a href="#">Departments</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

  <div class="topbar-left">
    <i class="bi bi-list"></i>


<div>
  <div class="hello-text">Hello {{ session.name }} 👋</div>
  <div class="breadcrumb">Home > Dashboard</div>
</div>


  </div>

  <div class="topbar-right">


<div class="search-box">
  <input type="text" placeholder="Search Here...">
  <i class="bi bi-search"></i>
</div>

<div class="icon-btn"><i class="bi bi-globe"></i></div>
<div class="icon-btn"><i class="bi bi-envelope"></i></div>
<div class="icon-btn"><i class="bi bi-bell"></i></div>

<div class="profile-box">
  <img src="/static/images/user.png">
  <div>
    <div>{{ session.name }}</div>
    <small>online</small>
  </div>
</div>


  </div>

</div>

{% block content %}{% endblock %}

</div>

</body>
</html>
