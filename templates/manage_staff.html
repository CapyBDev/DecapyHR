{% extends "base.html" %}
{% block content %}

<style>
body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}

.glass {
  background: rgba(131, 199, 255, 0.79);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}
.user-row { cursor: pointer; }

.details-panel {
  background: linear-gradient(135deg, #b3e6ff, #a2ffe8);
  border-left: 3px solid #54ffc9;
  min-height: 600px;
  padding: 25px;
  border-radius: 12px;
  transition: all .3s ease;
}

.details-panel.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateX(40px);
}

#overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.3);
  display:none;
  z-index:10;
}

#overlay.active { display:block; }
</style>

<div id="overlay"></div>

<div class="card">
  <div class="card-body">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4>Manage Staff</h4>

      <div class="d-flex gap-2">
        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#manageDepartmentModal">
          Manage Departments
        </button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
          + Add Employee
        </button>
      </div>
    </div>

    <!-- FILTER -->
    <div class="d-flex gap-2 mb-3">
      <input type="text" id="searchName" class="form-control" placeholder="Search name">

      <select id="filterDept" class="form-select">
        <option value="">All Department</option>
        {% for d in departments %}
          <option value="{{ d.name }}">{{ d.name }}</option>
        {% endfor %}
      </select>

      <select id="filterAvail" class="form-select">
        <option value="">All</option>
        <option value="Available">Available</option>
        <option value="Out">Out</option>
        <option value="WFH">WFH</option>
        <option value="MC">MC</option>
      </select>

      <button id="applyFilter" class="btn btn-primary">Filter</button>
    </div>

    <div class="row">

      <!-- TABLE -->
      <div class="col-8">
        <table id="userTable" class="table table-hover">
          <thead>
            <tr>
              <th>Name</th>
              <th>Department</th>
              <th>Position</th>
              <th>Availability</th>
            </tr>
          </thead>

          <tbody>
            {% for u in users %}
            {% set avail = u.availability or 'Available' %}
            <tr class="user-row"
                data-name="{{ u.full_name }}"
                data-dept="{{ u.department_name }}"
                data-avail="{{ avail }}"
                onclick='showDetails({{ u|tojson }})'>

              <td>{{ u.full_name }}</td>
              <td>{{ u.department_name or "-" }}</td>
              <td>{{ u.position or "-" }}</td>

              <td>
                <span class="badge
                {% if avail == 'Available' %} bg-success
                {% elif avail == 'Out' %} bg-primary
                {% elif avail == 'MC' %} bg-warning text-dark
                {% elif avail == 'WFH' %} bg-info text-dark
                {% else %} bg-secondary
                {% endif %}">
                  {{ avail }}
                </span>
              </td>

            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      <!-- DETAILS PANEL -->
      <div id="detailsPanel" class="col-4 details-panel hidden">

        <form id="updateUserForm">

          <input type="hidden" id="empId" name="id">

          <label>Name</label>
          <input type="text" id="empName" name="full_name" class="form-control mb-2">

          <label>Email</label>
          <input type="email" id="empEmail" name="email" class="form-control mb-2">

          <label>Phone</label>
          <input type="text" id="empPhone" name="phone" class="form-control mb-2">

          <label>Address</label>
          <input type="text" id="empAddress" name="address" class="form-control mb-2">

          <label>Position</label>
          <input type="text" id="empPosition" name="position" class="form-control mb-2">

          <label>Department</label>
          <select id="empDept" name="dept_id" class="form-select mb-2">
            <option value="">Select Department</option>
            {% for d in departments %}
              <option value="{{ d.id }}">{{ d.name }}</option>
            {% endfor %}
          </select>

          <label>Entitlement</label>
          <input type="number" id="empEntitlement" name="entitlement" class="form-control mb-2">

          <label>Availability</label>
          <select id="empAvailability" name="availability" class="form-select mb-2">
            <option value="Available">Available</option>
            <option value="Out">Out</option>
            <option value="WFH">WFH</option>
            <option value="MC">MC</option>
          </select>

          <button class="btn btn-success w-100 mt-2">Save</button>

          <button type="button" class="btn btn-warning w-100 mt-2" onclick="toggleResetLogin()">
            Reset Login
          </button>

          <div id="resetLoginBox" style="display:none;" class="mt-2">
            <input type="text" id="newUsername" class="form-control mb-2" placeholder="New Username">
            <input type="password" id="newPassword" class="form-control mb-2" placeholder="New Password">
            <button type="button" class="btn btn-primary w-100" onclick="submitNewLogin()">Update Login</button>
          </div>

        </form>

        <form id="deleteUserForm">
          <button class="btn btn-danger w-100 mt-2">Delete</button>
        </form>

      </div>

    </div>
  </div>
</div>

<script>
// FILTER
document.getElementById("applyFilter").onclick = () => {
  let name = searchName.value.toLowerCase();
  let dept = filterDept.value.toLowerCase();
  let avail = filterAvail.value.toLowerCase();

  document.querySelectorAll("#userTable tbody tr").forEach(row => {
    row.style.display =
      row.dataset.name.toLowerCase().includes(name) &&
      (dept === "" || row.dataset.dept.toLowerCase() === dept) &&
      (avail === "" || row.dataset.avail.toLowerCase() === avail)
      ? "" : "none";
  });
};

// SHOW DETAILS
function showDetails(user){
  detailsPanel.classList.remove("hidden");
  overlay.classList.add("active");

  empId.value = user.id;
  empName.value = user.full_name || "";
  empEmail.value = user.email || "";
  empPhone.value = user.phone || "";
  empAddress.value = user.address || "";
  empPosition.value = user.position || "";
  empDept.value = user.dept_id || ""; // FIXED
  empEntitlement.value = user.entitlement || 0;
  empAvailability.value = user.availability || "Available";

  deleteUserForm.action = `/admin/users/delete/${user.id}`;
}

// CLOSE PANEL
overlay.onclick = () => {
  detailsPanel.classList.add("hidden");
  overlay.classList.remove("active");
};

// UPDATE
updateUserForm.onsubmit = e => {
  e.preventDefault();

  fetch(`/admin/users/update/${empId.value}`, {
    method: "POST",
    body: new FormData(updateUserForm)
  }).then(()=>location.reload());
};

// DELETE
deleteUserForm.onsubmit = function(e){
  e.preventDefault();
  if(confirm("Delete user?")){
    fetch(this.action, {method:"POST"})
    .then(()=>location.reload());
  }
};

// RESET LOGIN
function toggleResetLogin(){
  const box = document.getElementById("resetLoginBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function submitNewLogin(){
  fetch(`/admin/users/reset_login/${empId.value}`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: newUsername.value,
      password: newPassword.value
    })
  }).then(()=>alert("Login updated"));
}
</script>

{% endblock %}
