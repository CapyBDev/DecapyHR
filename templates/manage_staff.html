{% extends "base.html" %}
{% block content %}

<style>
body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}
.glass {
  background: rgba(131, 199, 255, 0.79);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}

.card {
  border-radius: 14px;
  background: rgba(255,255,255,0.95);
  padding: 20px;
}

.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.filter-row input { flex: 2; }
.filter-row select { flex: 1; }

.modal-header-custom {
  background: #2c7be5;
  color: white;
  padding: 15px;
  font-weight: 600;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

.modal-footer-custom {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}
</style>

<div class="container mt-4">

<h4 class="text-white">Staff Management</h4>

<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
+ Add Staff
</button>

<div class="card p-3">

<table class="table table-hover">
<thead>
<tr>
<th>Name</th>
<th>Department</th>
<th>Position</th>
<th>Status</th>
</tr>
</thead>

<tbody>
{% for u in users %}
<tr onclick="openEditModal(this)"
data-id="{{u.id}}"
data-name="{{u.full_name}}"
data-email="{{u.email}}"
data-phone="{{u.phone}}"
data-address="{{u.address}}"
data-position="{{u.position}}"
data-deptid="{{u.dept_id}}"
data-entitlement="{{u.entitlement}}"
data-availability="{{u.availability}}">

<td><strong style="cursor:pointer">{{u.full_name}}</strong></td>
<td>{{u.department_name}}</td>
<td>{{u.position}}</td>
<td>{{u.availability}}</td>

</tr>
{% endfor %}
</tbody>

</table>

</div>
</div>

<!-- ADD MODAL -->

{% include "add_employee.html" %}

<!-- EDIT MODAL -->

<div class="modal fade" id="editEmployeeModal">
<div class="modal-dialog">
<div class="modal-content">

<form method="POST" id="updateForm">

<div class="modal-body">

<input id="empName" name="full_name" class="form-control mb-2">
<input id="empEmail" name="email" class="form-control mb-2">
<input id="empPhone" name="phone" class="form-control mb-2">
<input id="empAddress" name="address" class="form-control mb-2">
<input id="empPosition" name="position" class="form-control mb-2">

<select id="empDept" name="dept_id" class="form-control mb-2">
{% for d in departments %}
<option value="{{d.id}}">{{d.name}}</option>
{% endfor %}
</select>

<input id="empEntitlement" name="entitlement" class="form-control mb-2">

<select id="empAvailability" name="availability" class="form-control">
<option>Available</option>
<option>WFH</option>
<option>MC</option>
<option>Out</option>
</select>

<button class="btn btn-success w-100 mt-2">Save</button>

</div>

</form>

<form id="deleteForm" method="POST">
<button class="btn btn-danger w-100">Delete</button>
</form>

</div>
</div>
</div>

<script>
function openEditModal(row){

let id = row.dataset.id;

empName.value = row.dataset.name;
empEmail.value = row.dataset.email;
empPhone.value = row.dataset.phone;
empAddress.value = row.dataset.address;
empPosition.value = row.dataset.position;
empDept.value = row.dataset.deptid;
empEntitlement.value = row.dataset.entitlement;
empAvailability.value = row.dataset.availability;

updateForm.action = "/admin/users/update/" + id;
deleteForm.action = "/admin/users/delete/" + id;

new bootstrap.Modal(document.getElementById("editEmployeeModal")).show();
}
</script>

{% endblock %}
