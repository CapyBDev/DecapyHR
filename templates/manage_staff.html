{% extends "base.html" %}
{% block content %}

<style>
/* ===== BACKGROUND ===== */
body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}

.glass {
  background: rgba(131, 199, 255, 0.79);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  backdrop-filter: blur(6px);
  z-index: -1;
}

/* ===== TOP HEADER (FIXED) ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.35);
  padding: 12px 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.topbar h5 {
  color: #fff;
  margin: 0;
  font-weight: 600;
}

/* ===== CARD ===== */
.card {
  border-radius: 14px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border: none;
}

/* ===== FILTER ===== */
.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.filter-row input { flex: 2; }
.filter-row select { flex: 1; }

/* ===== TABLE ===== */
#userTable thead {
  background: #f1f3f6;
}

/* ===== MODAL (ADD STAFF STYLE) ===== */
.modal-content {
  border-radius: 16px;
  overflow: hidden;
  border: none;
}

.modal-header-custom {
  background: #2c7be5;
  color: white;
  padding: 15px 20px;
  font-weight: 600;
  font-size: 18px;
}

/* FORM GRID */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-size: 13px;
  color: #6c757d;
  margin-bottom: 4px;
}

.form-control,
.form-select {
  border-radius: 8px;
  padding: 10px;
}

/* BUTTON AREA */
.modal-footer-custom {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
}

</style>

<div class="page-container">

  <!-- TOP BAR (FIXED ALIGNMENT) -->

  <div class="topbar">
    <h5>Staff Management</h5>
    <div class="d-flex gap-2 align-items-center">
      <span class="text-white">Admin</span>
      <button class="btn btn-danger btn-sm">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- CARD -->

  <div class="card p-3">


<!-- FILTER -->
<div class="filter-row">
  <input type="text" id="searchName" class="form-control" placeholder="Search staff">

  <select id="filterDept" class="form-select">
    <option value="">All Departments</option>
    {% for d in departments %}
    <option value="{{ d.name }}">{{ d.name }}</option>
    {% endfor %}
  </select>

  <select id="filterAvail" class="form-select">
    <option value="">All Status</option>
    <option value="Available">Available</option>
    <option value="Out">Out</option>
    <option value="WFH">WFH</option>
    <option value="MC">MC</option>
  </select>

  <button id="applyFilter" class="btn btn-primary">
    <i class="bi bi-search"></i> Filter
  </button>
</div>

<!-- TABLE -->
<table id="userTable" class="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Department</th>
      <th>Position</th>
      <th>Status</th>
    </tr>
  </thead>

  <tbody>
    {% for u in users %}
    {% set avail = u.availability or 'Available' %}
    <tr class="user-row"

        data-id="{{ u.id }}"
        data-name="{{ u.full_name }}"
        data-email="{{ u.email }}"
        data-phone="{{ u.phone }}"
        data-address="{{ u.address }}"
        data-position="{{ u.position }}"
        data-deptid="{{ u.dept_id }}"
        data-entitlement="{{ u.entitlement }}"
        data-availability="{{ u.availability }}"
        data-dept="{{ u.department_name }}"
        data-avail="{{ avail }}">

      <td>
        <strong style="cursor:pointer; color:#2c7be5;"
          onclick="openEditModal(this.closest('tr'))">
          {{ u.full_name }}
        </strong>
      </td>

      <td>{{ u.department_name or "-" }}</td>
      <td>{{ u.position or "-" }}</td>

      <td>
        <span class="badge bg-success">{{ avail }}</span>
      </td>

    </tr>
    {% endfor %}
  </tbody>
</table>


  </div>
</div>

<!--  EDIT MODAL (LIKE ADD STAFF) -->

<div class="modal fade" id="editEmployeeModal">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

  <!-- HEADER -->
  <div class="modal-header-custom">
    <i class="bi bi-person-lines-fill"></i> Edit Employee
  </div>

  <!-- FORM -->
  <form id="updateUserForm" method="post">

    <div class="form-grid">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="empName" name="full_name" class="form-control">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="empEmail" name="email" class="form-control">
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="empPhone" name="phone" class="form-control">
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text" id="empAddress" name="address" class="form-control">
      </div>

      <div class="form-group">
        <label>Department</label>
        <select id="empDept" name="dept_id" class="form-select">
          {% for d in departments %}
          <option value="{{ d.id }}">{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Position</label>
        <input type="text" id="empPosition" name="position" class="form-control">
      </div>

      <div class="form-group">
        <label>Entitlement</label>
        <input type="number" id="empEntitlement" name="entitlement" class="form-control">
      </div>

      <div class="form-group">
        <label>Availability</label>
        <select id="empAvailability" name="availability" class="form-select">
          <option>Available</option>
          <option>Out</option>
          <option>WFH</option>
          <option>MC</option>
          <option>Resign</option>
        </select>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="modal-footer-custom">

      <button type="button" class="btn btn-warning" onclick="toggleResetLogin()">
        <i class="bi bi-key"></i> Login
      </button>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">
          Save
        </button>

        <button type="submit" class="btn btn-outline-danger">
          <i class="bi bi-trash"></i>
        </button>
      </div>

    </div>

  </form>

</div>

  </div>
</div>

<script>
function openEditModal(row){
  empName.value = row.dataset.name || "";
  empEmail.value = row.dataset.email || "";
  empPhone.value = row.dataset.phone || "";
  empAddress.value = row.dataset.address || "";
  empPosition.value = row.dataset.position || "";
  empDept.value = row.dataset.deptid || "";
  empEntitlement.value = row.dataset.entitlement || 0;
  empAvailability.value = row.dataset.availability || "Available";

  new bootstrap.Modal(document.getElementById('editEmployeeModal')).show();
}
</script>

{% endblock %}
