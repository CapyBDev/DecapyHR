{% extends "base.html" %}
{% block content %}

<style>
body {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(41,87,157,0.9)),
              url('/static/images/DJI_0094.JPG');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  overflow-x: hidden;
}

/* CARD */
.card {
  border-radius: 16px;
  background: linear-gradient(rgba(245, 245, 255, 0.4), rgba(97, 134, 228, 0.72));
  padding: 20px;
}

/* FILTER */
.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

/* MODAL */
.modal-header-custom {
  background: #2c7be5;
  color: white;
  padding: 15px;
  font-weight: 600;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

.modal-footer-custom {
  padding: 15px;
  text-align: right;
}

/* BADGE */
.badge { border-radius: 10px; padding:6px 12px; }
</style>

<div class="container mt-4">

<!-- HEADER -->
<div class="d-flex justify-content-between mb-3">
  <h4 class="text-white">Staff Management</h4>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
      + Add Staff
    </button>
  </div>
</div>

<div class="card">

<!-- FILTER -->
<div class="filter-row">
  <input type="text" id="searchName" class="form-control" placeholder="Search staff">

  <select id="filterDept" class="form-select">
    <option value="">All Departments</option>
    {% for d in departments %}
    <option value="{{ d.name }}">{{ d.name }}</option>
    {% endfor %}
  </select>

  <button onclick="applyFilter()" class="btn btn-primary">Filter</button>
</div>

<!-- TABLE -->
<table class="table">
<thead>
<tr>
  <th>Name</th>
  <th>Department</th>
  <th>Position</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="staffTable">
{% for u in users %}
<tr 
  data-name="{{u.full_name}}"
  data-dept="{{u.department_name}}"
  data-id="{{u.id}}"
  data-email="{{u.email}}"
  data-phone="{{u.phone}}"
  data-address="{{u.address}}"
  data-position="{{u.position}}"
  data-deptid="{{u.dept_id}}"
  data-entitlement="{{u.entitlement}}"
  data-availability="{{u.availability}}"
>

<td>
  <strong style="cursor:pointer;color:#2c7be5"
    onclick="openEditModal(this.closest('tr'))">
    {{u.full_name}}
  </strong>
</td>

<td>{{u.department_name}}</td>
<td>{{u.position}}</td>

<td>
<span class="badge 
{% if u.availability=='Available' %}bg-success
{% elif u.availability=='WFH' %}bg-primary
{% elif u.availability=='MC' %}bg-warning
{% else %}bg-danger
{% endif %}
">
{{u.availability}}
</span>
</td>

</tr>
{% endfor %}
</tbody>
</table>

</div>
</div>

<!-- ================= ADD MODAL ================= -->
<div class="modal fade" id="addEmployeeModal">
<div class="modal-dialog modal-xl modal-dialog-centered">
<div class="modal-content">

<div class="modal-header-custom">Add Employee</div>

<form method="POST" action="/admin/users/create">
<div class="form-grid">

<input name="full_name" placeholder="Full Name" class="form-control" required>
<input name="email" placeholder="Email" class="form-control" required>
<input name="phone" placeholder="Phone" class="form-control">
<input name="address" placeholder="Address" class="form-control">

<select name="dept_id" class="form-select" required>
<option value="">Department</option>
{% for d in departments %}
<option value="{{d.id}}">{{d.name}}</option>
{% endfor %}
</select>

<input name="position" placeholder="Position" class="form-control">
<input name="entitlement" type="number" placeholder="Leave Days" class="form-control">

<select name="availability" class="form-select">
<option>Available</option>
<option>WFH</option>
<option>MC</option>
<option>Out</option>
</select>

</div>

<div class="modal-footer-custom">
<button class="btn btn-primary">Add</button>
</div>
</form>

</div>
</div>
</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal fade" id="editEmployeeModal">
<div class="modal-dialog modal-xl modal-dialog-centered">
<div class="modal-content">

<div class="modal-header-custom">Edit Employee</div>

<form method="POST" id="updateForm">
<input type="hidden" id="empId">

<div class="form-grid">

<input id="empName" name="full_name" class="form-control">
<input id="empEmail" name="email" class="form-control">
<input id="empPhone" name="phone" class="form-control">
<input id="empAddress" name="address" class="form-control">

<select id="empDept" name="dept_id" class="form-select">
{% for d in departments %}
<option value="{{d.id}}">{{d.name}}</option>
{% endfor %}
</select>

<input id="empPosition" name="position" class="form-control">
<input id="empEntitlement" name="entitlement" class="form-control">

<select id="empAvailability" name="availability" class="form-select">
<option>Available</option>
<option>WFH</option>
<option>MC</option>
<option>Out</option>
<option>Resign</option>
</select>

</div>

<div class="modal-footer-custom d-flex justify-content-between">

<button type="button" id="deleteBtn" class="btn btn-danger">Delete</button>

<button class="btn btn-success">Save</button>

</div>

</form>

<form id="deleteForm" method="POST"></form>

</div>
</div>
</div>

<script>

// FILTER
function applyFilter(){
  let name = document.getElementById("searchName").value.toLowerCase();
  let dept = document.getElementById("filterDept").value;

  document.querySelectorAll("#staffTable tr").forEach(row=>{
    let match = row.dataset.name.toLowerCase().includes(name) &&
                (dept=="" || row.dataset.dept==dept);

    row.style.display = match ? "" : "none";
  });
}

// OPEN EDIT
function openEditModal(row){
  let id = row.dataset.id;

  empId.value = id;
  empName.value = row.dataset.name;
  empEmail.value = row.dataset.email;
  empPhone.value = row.dataset.phone;
  empAddress.value = row.dataset.address;
  empPosition.value = row.dataset.position;
  empDept.value = row.dataset.deptid;
  empEntitlement.value = row.dataset.entitlement;
  empAvailability.value = row.dataset.availability;

  document.getElementById("updateForm").action = "/admin/users/update/" + id;
  document.getElementById("deleteForm").action = "/admin/users/delete/" + id;

  new bootstrap.Modal(document.getElementById("editEmployeeModal")).show();
}

// DELETE
document.getElementById("deleteBtn").onclick = function(){
  if(confirm("Delete this user?")){
    document.getElementById("deleteForm").submit();
  }
};

</script>

{% endblock %}
