{% extends "base.html" %}
{% block content %}

<style>
  body {
  height: 100vh;

  background: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(41, 87, 157, 0.91)), 
    url('/static/images/DJI_0094.JPG');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  overflow-x: hidden;
}

.glass {
  background: rgba(12, 137, 254, 0.37);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}

.user-row { cursor:pointer; }

.details-panel {
  background: linear-gradient(135deg,#b3e6ff,#a2ffe8);
  border-left: 3px solid #54ffc9;
  min-height: 600px;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.hidden {
  display: none;
}
</style>

<div class="container mt-4">

<div class="d-flex justify-content-between mb-3">
  <h4 class="text-white">Staff Management</h4>

  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
    + Add Staff
  </button>
</div>

<div class="row">

<!-- LEFT TABLE -->

<div class="col-8">

<div class="card p-3">

<table class="table table-hover">
<thead>
<tr>
<th>Name</th>
<th>Department</th>
<th>Position</th>
<th>Status</th>
</tr>
</thead>

<tbody>
{% for u in users %}
<tr class="user-row" onclick='showDetails({{ u|tojson }})'>
<td>{{u.full_name}}</td>
<td>{{u.department_name}}</td>
<td>{{u.position}}</td>
<td>{{u.availability}}</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>
</div>

<!-- RIGHT PANEL -->

<div id="detailsPanel" class="col-4 details-panel hidden">

<h5>Employee Details</h5>

<form id="updateForm" method="POST">

<input type="hidden" id="empId">

<label>Name</label> <input id="empName" name="full_name" class="form-control mb-2">

<label>Email</label> <input id="empEmail" name="email" class="form-control mb-2">

<label>Phone</label> <input id="empPhone" name="phone" class="form-control mb-2">

<label>Address</label> <input id="empAddress" name="address" class="form-control mb-2">

<label>Position</label> <input id="empPosition" name="position" class="form-control mb-2">

<label>Department</label> <select id="empDept" name="dept_id" class="form-control mb-2">
{% for d in departments %}

<option value="{{d.id}}">{{d.name}}</option>
{% endfor %}
</select>

<label>Entitlement</label> <input id="empEntitlement" name="entitlement" class="form-control mb-2">

<label>Status</label> <select id="empAvailability" name="availability" class="form-control mb-2">

<option>Available</option>
<option>WFH</option>
<option>MC</option>
<option>Out</option>
</select>

<button class="btn btn-success w-100 mt-2">Save</button>

</form>

<form id="deleteForm" method="POST">
<button class="btn btn-danger w-100 mt-2">Delete</button>
</form>

</div>

</div>
</div>

<!-- ADD MODAL -->

{% include "/components/modals/add_employee.html" %}

<script>

// SHOW PANEL
function showDetails(user){

  document.getElementById("detailsPanel").classList.remove("hidden");

  empId.value = user.id;
  empName.value = user.full_name;
  empEmail.value = user.email;
  empPhone.value = user.phone;
  empAddress.value = user.address;
  empPosition.value = user.position;
  empDept.value = user.dept_id;
  empEntitlement.value = user.entitlement;
  empAvailability.value = user.availability;

  updateForm.action = "/admin/users/update/" + user.id;
  deleteForm.action = "/admin/users/delete/" + user.id;
}

// UPDATE (AJAX)
updateForm.onsubmit = function(e){
  e.preventDefault();

  fetch(updateForm.action,{
    method:"POST",
    body:new FormData(updateForm)
  }).then(()=>location.reload());
};

// DELETE
deleteForm.onsubmit = function(e){
  e.preventDefault();

  if(confirm("Delete this user?")){
    fetch(deleteForm.action,{method:"POST"})
    .then(()=>location.reload());
  }
};

</script>

{% endblock %}
