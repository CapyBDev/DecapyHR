{% extends "layout.html" %}
{% block content %}

<style>
.glass {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 20px;
  color: white;
}
</style>

<h3 class="text-white mb-4">Employees</h3>

<div class="glass">

<table class="table text-white">
<tr><th>Name</th><th>Email</th><th>Role</th></tr>

{% for u in users %}
<tr>
<td>{{ u.name }}</td>
<td>{{ u.email }}</td>
<td>{{ u.role }}</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
