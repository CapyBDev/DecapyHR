{% extends "user_base.html" %}
{% block content %}

<div class="card-custom">
<h4>My Claims</h4>

<form method="POST">
  <input name="title" placeholder="Claim Title" class="form-control mb-2">
  <input name="amount" placeholder="Amount" class="form-control mb-2">
  <button class="btn btn-primary">Submit</button>
</form>

<hr>

<table class="table">
<tr>
<th>Title</th>
<th>Amount</th>
<th>Status</th>
</tr>

{% for c in claims %}
<tr>
<td>{{c[1]}}</td>
<td>RM {{c[2]}}</td>
<td>{{c[3]}}</td>
</tr>
{% endfor %}
</table>

</div>

{% endblock %}
